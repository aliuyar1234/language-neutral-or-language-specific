project:
  name: language_neutral_vs_specific_fmri
  title: "Language-Neutral or Language-Specific? Disentangling Multilingual LLM Subspaces with Naturalistic fMRI"
  paper_scope: core_lppc_only
  optional_appendix: studyforrest_german

data:
  core_dataset:
    name: LPPC-fMRI
    accession: ds003643
    openneuro_url: https://openneuro.org/datasets/ds003643
    github_url: https://github.com/OpenNeuroDatasets/ds003643
  appendix_dataset:
    name: studyforrest
    accession: ds000113
    openneuro_url: https://openneuro.org/datasets/ds000113
    github_url: https://github.com/OpenNeuroDatasets/ds000113

languages:
  core: [en, fr, zh]
  pivot: en

lppc_expected_subject_counts:
  en: 49
  zh: 35
  fr: 28

lppc_expected_preproc_scan_counts:
  en: [282, 298, 340, 303, 265, 343, 325, 292, 368]
  zh: [283, 322, 322, 307, 293, 392, 364, 293, 401]
  fr: [309, 326, 354, 315, 293, 378, 332, 294, 336]

lppc_visual_picture_events:
  enabled_for_languages: [en, zh]
  canonical_run_index: 1
  picture_event_onsets_sec: [10.0, 35.0, 60.0]
  picture_block_onsets_sec: [10.0, 35.0, 60.0]
  picture_block_durations_sec: [15.0, 20.0, 15.0]

timing_rules:
  target_time_zero: audio_onset_in_preprocessed_bold
  use_target_language_timeline_for_all_conditions: true

paths:
  raw_data_root: data/raw
  interim_root: data/interim
  processed_root: data/processed
  outputs_root: outputs

random_seed: 20260314
subject_inclusion:
  require_all_9_canonical_runs_for_main_analysis: true
  scan_count_tolerance_volumes: 1
